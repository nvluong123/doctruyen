name: Build APK

on:
  push:
  workflow_dispatch:

jobs:
  build-android:
    runs-on: ubuntu-latest
    steps:
      - name: Lấy code
        uses: actions/checkout@v4

      - name: Cài Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Cài công cụ build Android
        run: |
          sudo apt-get update
          sudo apt-get install -y openjdk-17-jdk zip unzip autoconf libtool pkg-config \
            zlib1g-dev libncurses-dev cmake libffi-dev libssl-dev
          python -m pip install --upgrade pip
          pip install buildozer cython

      - name: Build APK bằng Buildozer
        run: buildozer android debug

      - name: Tải APK lên Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: doctruyen-apk
          path: bin/*.apk
